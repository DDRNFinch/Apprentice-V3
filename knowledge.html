<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Knowledge check</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="app"><header><a class="back" href="index.html">← Assignment</a><h1 class="title">3. Knowledge questions</h1><div class="sub">Ten questions covering the Health & Safety KSBs. Pass mark: 80%.</div></header><main>
<div class="card" id="quizBox"><div id="qnum" class="small"></div><div id="q" class="question"></div><div id="opts"></div><button class="button" id="next" disabled>Next question</button></div>
<div class="card hidden" id="result"><div class="score" id="score"></div><p id="resultText" style="text-align:center"></p><button class="button secondary" id="retry">Try again</button></div>
<div class="card"><h3>Question KSB coverage</h3><p class="small">K1, K2, K3, S2 and B1. Practical skill S1 is assessed in the college practical section.</p></div>
</main></div>
<script src="app.js"></script><script>
let i=0,answers={};function show(){const x=quiz[i];qnum.textContent=`Question ${i+1} of ${quiz.length} · ${x.k}`;q.textContent=x.q;opts.innerHTML=x.o.map((o,j)=>`<label class="option"><input type="radio" name="a" value="${j}">${o}</label>`).join("");next.disabled=true;document.querySelectorAll('input[name=a]').forEach(r=>r.onchange=()=>{answers[i]=Number(r.value);next.disabled=false;});next.textContent=i===quiz.length-1?"Finish quiz":"Next question";}
next.onclick=()=>{if(i<quiz.length-1){i++;show()}else finish()};
function finish(){let n=0;quiz.forEach((x,j)=>{if(answers[j]===x.a)n++});const pc=Math.round(n/quiz.length*100);state.quizAnswers=answers;state.quizScore=pc;state.quizPassed=pc>=80;save();quizBox.classList.add("hidden");result.classList.remove("hidden");score.textContent=pc+"%";resultText.textContent=pc>=80?"Passed. Your result has been saved.":"Not yet passed. Review the topics and try again.";}
retry.onclick=()=>{i=0;answers={};result.classList.add("hidden");quizBox.classList.remove("hidden");show()};show();
</script></body></html>
